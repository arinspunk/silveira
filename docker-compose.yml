# Proyecto: silveira
# URL canónica: http://silveira.localhost (puerto 80 por defecto en el navegador).
# Puerto publicado: 80 del host -> 80 del contenedor. Si el 80 está ocupado, cambia el mapeo en `ports`.

services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wordpress}
      MYSQL_USER: ${MYSQL_USER:-wordpress}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  wordpress:
    image: wordpress:php8.2-apache
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://silveira.localhost');
        define('WP_SITEURL', 'http://silveira.localhost');
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/silveira:/var/www/html/wp-content/themes/silveira
    depends_on:
      db:
        condition: service_healthy

  wpcli:
    image: wordpress:cli-php8.2
    user: "33:33"
    profiles: ["tools"]
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/silveira:/var/www/html/wp-content/themes/silveira
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started

volumes:
  db_data:
  wp_data:
